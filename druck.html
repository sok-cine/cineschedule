<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSchedule PRO – Druck</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--s1:#0f0f1a;--s2:#161624;--s3:#1e1e30;--border:#252538;--border2:#30304a;--accent:#f0c040;--accent2:#ff6030;--green:#2ed87a;--red:#ff3355;--blue:#4a90ff;--text:#e0e0f0;--muted:#606080;--muted2:#9090b0;--radius:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--s1);border-bottom:2px solid var(--accent);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:300;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;letter-spacing:4px;color:var(--accent);}
.logo em{color:var(--text);font-style:normal;}
.logo-sub{font-size:.54rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:1px;}
.role-badge{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase;margin-left:8px;background:rgba(74,144,255,.15);color:var(--blue);border:1px solid rgba(74,144,255,.3);}
.btn{padding:6px 15px;border-radius:4px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.79rem;font-weight:600;letter-spacing:.4px;transition:all .2s;}
.btn-s{background:transparent;border:1px solid var(--border2);color:var(--muted2);}
.btn-s:hover{border-color:var(--accent);color:var(--accent);}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:#f8d050;}
.btn-sm{padding:3px 9px;font-size:.72rem;}
main{padding:22px 26px;max-width:1700px;margin:0 auto;}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:var(--accent);}
.psub{color:var(--muted);font-size:.78rem;letter-spacing:1px;margin-top:3px;margin-bottom:18px;}

/* Day selector */
.day-selector{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;margin-bottom:0;display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow-x:auto;max-width:55vw;}
.day-tab{white-space:nowrap;flex-shrink:0;background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:4px 11px;border-radius:4px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.76rem;transition:all .2s;}
.day-tab:hover{border-color:var(--border2);color:var(--text);}
.day-tab.active{background:rgba(240,192,64,.1);border-color:var(--accent);color:var(--accent);}

/* View tabs */
.view-tabs{display:flex;gap:3px;background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:3px;width:fit-content;margin-bottom:14px;}
.vtab{background:transparent;border:none;color:var(--muted2);padding:5px 13px;border-radius:3px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.76rem;transition:all .2s;}
.vtab:hover{color:var(--text);}
.vtab.active{background:var(--s3);color:var(--accent);}

/* Timeline */
.tl-wrap{overflow-x:auto;background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);}
.tl-inner{min-width:900px;}
.ruler{display:flex;border-bottom:1px solid var(--border);background:var(--s2);height:30px;}
.r-lbl{width:70px;min-width:70px;border-right:1px solid var(--border);display:flex;align-items:center;padding-left:10px;font-size:.6rem;letter-spacing:1px;color:var(--muted);}
.r-hrs{flex:1;position:relative;height:30px;}
.hm{position:absolute;top:0;height:100%;border-left:1px solid var(--border2);display:flex;align-items:center;padding-left:4px;}
.hm span{font-size:.6rem;color:var(--muted2);}
.tl-row{display:flex;border-bottom:1px solid var(--border);min-height:44px;}
.tl-rl{width:70px;min-width:70px;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;background:var(--s2);}
.tl-rl .tn{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--accent);}
.tl-rl .ts{font-size:.52rem;color:var(--muted);letter-spacing:1px;}
.tl-track{flex:1;position:relative;background:repeating-linear-gradient(90deg,transparent,transparent calc(var(--hw) - 1px),var(--border) calc(var(--hw) - 1px),var(--border) var(--hw));}
.mb{position:absolute;top:5px;height:calc(100% - 10px);border-radius:4px;display:flex;flex-direction:column;justify-content:center;padding:0 6px;overflow:hidden;border:1px solid rgba(255,255,255,.07);}
.mb .mbt{font-weight:700;font-size:.65rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mb .mbt2{font-size:.56rem;color:rgba(255,255,255,.7);margin-top:1px;}
.mb .mbl{font-size:.52rem;color:rgba(255,255,255,.5);margin-top:1px;}
.mb-ad{position:absolute;top:5px;height:calc(100% - 10px);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* Box view */
.box-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.box-saal{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.box-head{background:var(--s2);padding:7px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.box-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--accent);}
.box-shows{padding:7px 9px;display:flex;gap:5px;flex-wrap:wrap;}
.box-show{border-radius:4px;padding:7px 9px;flex:1;min-width:100px;border:1px solid rgba(255,255,255,.08);}
.bs-title{font-weight:700;font-size:.78rem;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bs-row{font-size:.67rem;color:rgba(255,255,255,.66);display:flex;justify-content:space-between;gap:4px;margin-top:1px;}
.bs-row span:last-child{font-weight:600;color:rgba(255,255,255,.88);}
.box-empty{color:var(--muted);font-size:.74rem;padding:8px 12px;font-style:italic;}
.saal-info-badge{font-size:.55rem;font-weight:700;padding:1px 4px;border-radius:2px;text-transform:uppercase;}
.badge-3d{background:rgba(74,144,255,.18);color:var(--blue);border:1px solid rgba(74,144,255,.35);}
.badge-imax{background:rgba(240,192,64,.18);color:var(--accent);border:1px solid rgba(240,192,64,.35);}
.badge-3dimax{background:rgba(155,61,192,.18);color:#c060ff;border:1px solid rgba(155,61,192,.35);}

/* Table */
table{width:100%;border-collapse:collapse;background:var(--s1);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);font-size:.79rem;}
thead tr{background:var(--s2);}
th{padding:9px 11px;text-align:left;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500;}
td{padding:8px 11px;border-bottom:1px solid rgba(37,37,56,.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tg{padding:2px 6px;border-radius:3px;font-size:.67rem;font-weight:700;}
.tg-s{background:rgba(240,192,64,.12);color:var(--accent);}
.tn{font-variant-numeric:tabular-nums;}

/* Gap pills */
.gap-pill{display:inline-block;padding:2px 10px;border-radius:4px;font-size:.68rem;font-weight:700;white-space:nowrap;}
.gp-g{background:rgba(46,216,122,.1);color:var(--green);border:1px solid rgba(46,216,122,.2);}
.gp-w{background:rgba(255,160,0,.1);color:#ffa000;border:1px solid rgba(255,160,0,.2);}
.gp-r{background:rgba(255,51,85,.1);color:var(--red);border:1px solid rgba(255,51,85,.2);}

/* Wochenübersicht */
.week-controls{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.week-table-wrap{overflow-x:auto;}
.week-table{border-collapse:collapse;width:100%;min-width:700px;border-radius:var(--radius);overflow:hidden;}
.week-table th{padding:9px 10px;text-align:left;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap;}
.week-table th.wt-day-header{background:var(--s1);}
.week-table th.wt-saal{background:var(--s2);color:var(--accent);min-width:110px;text-align:center;border-left:1px solid var(--border);}
.week-table td.wt-day-label{background:var(--s2);white-space:nowrap;border-right:2px solid var(--border2);padding:8px 10px;vertical-align:middle;}
.week-table td{padding:6px 8px;border:1px solid rgba(37,37,56,.5);vertical-align:top;}
.week-table tbody tr:nth-child(odd) td{background:var(--s1);}
.week-table tbody tr:nth-child(even) td{background:rgba(22,22,36,.6);}
.week-table tbody tr:nth-child(odd) td.wt-day-label{background:var(--s2);}
.week-table tbody tr:nth-child(even) td.wt-day-label{background:var(--s3);}
.week-table tr.wt-today td{background:rgba(240,192,64,.06)!important;}
.week-table tr.wt-today td.wt-day-label{background:rgba(240,192,64,.15)!important;border-right:2px solid var(--accent);}
.wc-day{font-family:'Bebas Neue',sans-serif;font-size:.92rem;letter-spacing:1px;}
.wc-date{font-size:.64rem;color:var(--muted);margin-top:1px;}
.wc-show{background:var(--s3);border-radius:4px;padding:4px 7px;margin-bottom:3px;border-left:3px solid var(--border2);}
.wc-title{font-size:.72rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.wc-time{font-size:.68rem;color:var(--accent);font-weight:700;margin-top:1px;}
.wc-empty{color:var(--muted);font-size:.68rem;}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(8,8,16,.85);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:8px 17px;border-radius:5px;font-weight:600;font-size:.82rem;z-index:999;transform:translateY(42px);opacity:0;transition:all .26s;pointer-events:none;}
.toast.show{transform:none;opacity:1;}
.toast.ok{background:var(--green);color:#000;}
.toast.err{background:var(--red);color:#fff;}
.toast.info{background:var(--accent);color:#000;}

/* Säle SW */
.leg-row{display:flex;gap:12px;margin-top:9px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted);}
.lsw{width:16px;height:10px;border-radius:2px;}

@media print{
  @page{size:A4 landscape;margin:5mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;}
  body{background:#fff!important;color:#000!important;font-size:8px;font-family:'Outfit',sans-serif;}
  header,.day-selector,.view-tabs,.no-print,#dayTabs{display:none!important;}
  main{padding:0!important;max-width:100%!important;}
  .ptitle{font-size:1.2rem!important;color:#000!important;letter-spacing:2px!important;}
  .psub{display:none!important;}
  .tv-panel{display:none!important;}
  .tv-panel.print-active{display:block!important;}
  /* Säle */
  .box-grid{grid-template-columns:repeat(3,1fr)!important;gap:4px!important;}
  .box-saal{background:#fff!important;border:3px solid #333!important;border-radius:3px!important;}
  .box-head{background:#e0e0e0!important;border-bottom:3px solid #333!important;padding:4px 10px!important;}
  .box-num{color:#000!important;font-size:.95rem!important;}
  .box-shows{padding:5px 7px!important;gap:4px!important;}
  .box-show{padding:5px 7px!important;border-radius:3px!important;}
  .bs-title{font-weight:700!important;color:#000!important;}
  .bs-row{color:#444!important;}
  .bs-row span:last-child{color:#000!important;}
  /* Auslasszettel */
  table{font-size:.72rem!important;border-color:#ccc!important;background:#fff!important;}
  thead tr{background:#ececec!important;}
  th{padding:5px 7px!important;color:#444!important;border-color:#ccc!important;font-size:.58rem!important;}
  td{padding:4px 7px!important;border-color:#e5e5e5!important;background:#fff!important;}
  tr{background:#fff!important;}
  .tg-s{background:#fff8e0!important;color:#806000!important;}
  .tg-s td{background:#fff8e0!important;}
  .gap-pill{font-size:.58rem!important;}
  #tableContainer input[type=text]{background:transparent!important;border:1px solid #999!important;color:#000!important;}
  strong{color:#000!important;}
  .tn{color:#000!important;}
}

.step-nav{display:flex;gap:3px;margin:0 12px;}
.snb{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:5px 13px;border-radius:4px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.76rem;letter-spacing:.4px;transition:all .2s;display:flex;align-items:center;gap:5px;text-decoration:none;}
.snb .n{width:17px;height:17px;border-radius:50%;background:var(--border2);color:var(--muted2);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;transition:all .2s;}
.snb:hover,.snb.active{border-color:var(--accent);color:var(--accent);}
.snb:hover .n,.snb.active .n{background:var(--accent);color:#000;}
.snb.arch{border-color:var(--border2);}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div style="color:var(--muted);font-size:.8rem;">Wird geladen…</div>
</div>

<header>
  <div>
    <div class="logo">Cine<em>Schedule</em> <span style="font-size:.82rem;letter-spacing:2px;color:var(--muted2)">PRO</span></div>
    <div class="logo-sub">Druck & Ausdruck · <span style="color:var(--accent);letter-spacing:1px;">v5.3</span></div>
  </div>
  <nav class="step-nav" id="mainNav"></nav>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
    <span id="userLabel" style="font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:3px;background:rgba(74,144,255,.15);color:var(--blue);border:1px solid rgba(74,144,255,.3);">🖨️ Druck</span>
    <button class="btn btn-s btn-sm" onclick="doLogout()">🔒 Abmelden</button>
  </div>
</header>

<main>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
    <div>
      <div class="ptitle" id="tlTitle">SÄLE</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:2px;color:var(--muted2);margin-top:3px;" id="tlDate"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px;">
      <div style="display:flex;gap:6px;align-items:center;" class="no-print">
        <div class="day-selector" style="padding:6px;margin:0;" id="dayTabs"></div>
        <button class="btn btn-p btn-sm" onclick="printActive()">🖨 Drucken / PDF</button>
      </div>
      <div class="view-tabs">
        <button class="vtab active" onclick="setView('boxes-bw')">🎬 Säle S/W</button>
        <button class="vtab" onclick="setView('table')">📋 Auslasszettel</button>
      </div>
    </div>
  </div>

  <div id="tv-boxes-bw" style="display:none;"><div id="boxContainerBW"></div></div>
  <div id="tv-table" style="display:none;"><div id="tableContainer"></div></div>
</main>

<div class="toast" id="toastEl"></div>

<script>
// ── SUPABASE ────────────────────────────────────────────
const SUPABASE_URL = 'https://bzoewjopqhdundcfwpww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6b2V3am9wcWhkdW5kY2Z3cHd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDk0OTQsImV4cCI6MjA5MjEyNTQ5NH0.gj-BCQ20LZLGQmch1WqWvHLVcO65LnAp96Kym4ZrNUs';

let session = null;
let DB = { films:[], days:{}, archive:{}, settings:{} };
let curDay = '';
let activeView = 'boxes-bw';
let _entries = [], _ovMap = {}, _cleanup = 30;
let cmap = {}, cidx = 0;
let _weekFrom = '', _weekTo = '';

const COLORS=[
  ['#3d2e1e','#6b4c2a'],['#1e2e3d','#2a4a5e'],['#2e3d1e','#4a6b2a'],
  ['#3d1e2e','#6b2a4a'],['#2e2e1e','#5e5a2a'],['#1e3d3a','#2a6b62'],
  ['#3a2a1e','#7a5a38'],['#1e243d','#2a3870'],['#3d2e1e','#7a5c3a'],
  ['#1e3d2e','#2a6b4a'],['#2e1e3a','#5a3870'],['#3a3028','#6e5c40'],
];
function fc(id){ if(!cmap[id]) cmap[id]=COLORS[cidx++%COLORS.length]; return cmap[id]; }
function resetColors(){ cmap={}; cidx=0; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function t2m(t){ if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m; }
function m2t(m){ const h=Math.floor(m/60)%24,mn=m%60; return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`; }
function toast(msg,type='info'){ const t=document.getElementById('toastEl'); t.innerHTML=msg; t.className=`toast ${type} show`; clearTimeout(t._to); t._to=setTimeout(()=>t.classList.remove('show'),3000); }
function fmtDate(d){ try{ return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}); }catch{return d;} }

function fskBadge(fsk){
  const n=parseInt(fsk); if(isNaN(n)||n<0) return '';
  const styles={0:'background:#fff;color:#000;border:1px solid #ccc;',6:'background:#f5c400;color:#000;',12:'background:#1a8a2a;color:#fff;',16:'background:#1a4aaa;color:#fff;',18:'background:#cc0000;color:#fff;border:2px solid #990000;'};
  const style=styles[n]||'background:#555;color:#fff;';
  return `<span style="${style}font-size:.6rem;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:4px;">FSK ${n}</span>`;
}
function saalBadgeHtml(s){
  const si=(DB.settings&&DB.settings.saale&&DB.settings.saale[s])||{}, t=si.type||'normal';
  if(t==='normal') return '';
  const map={imax:['badge-imax','IMAX'],'3d':['badge-3d','3D'],'3dimax':['badge-3dimax','3D IMAX']};
  const [cls,lbl]=map[t]||['',''];
  return `<span class="saal-info-badge ${cls}">${lbl}</span>`;
}

// ── AUTH ────────────────────────────────────────────────

function buildNav() {
  const sess = JSON.parse(localStorage.getItem('csp_session') || 'null');
  if (!sess) return;
  const nav = document.getElementById('mainNav');
  if (!nav) return;
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  if (sess.rolle === 'programmplanung') {
    nav.innerHTML = `
      <a class="snb${currentPage==='programm.html'?' active':''}" href="programm.html"><span class="n">1</span> Filmkatalog</a>
      <a class="snb${currentPage==='programm.html'?' active':''}" href="programm.html?step=2"><span class="n">2</span> Planung</a>
      <a class="snb${currentPage==='programm.html'?' active':''}" href="programm.html?step=3"><span class="n">3</span> Zeitleiste</a>
      <a class="snb${currentPage==='programm.html'?' active':''}" href="programm.html?step=4"><span class="n">⚙</span> Einstellungen</a>
      <a class="snb${currentPage==='zeiten.html'?' active':''}" href="zeiten.html"><span class="n">✏️</span> Zeiten</a>
      <a class="snb${currentPage==='druck.html'?' active':''}" href="druck.html"><span class="n">🖨</span> Druck</a>`;
  } else if (sess.rolle === 'zeiten') {
    nav.innerHTML = `
      <a class="snb${currentPage==='zeiten.html'?' active':''}" href="zeiten.html"><span class="n">✏️</span> Zeiten</a>
      <a class="snb${currentPage==='druck.html'?' active':''}" href="druck.html"><span class="n">🖨</span> Druck</a>`;
  }
  // druck rolle: keine navigation nötig
}

async function init(){
  session = JSON.parse(localStorage.getItem('csp_session')||'null');
  if(!session?.token){ window.location.href='index.html'; return; }
  // Rolle prüfen
  if(!['druck','zeiten','programmplanung'].includes(session.rolle)){
    window.location.href='index.html'; return;
  }
  document.getElementById('userLabel').textContent = session.name || session.rolle;
  buildNav();
  await loadFromServer();
  document.getElementById('loadingOverlay').style.display='none';
}

async function clearPresence() {
  try {
    const sess = JSON.parse(localStorage.getItem('csp_session') || 'null');
    if (!sess?.token || !sess?.rolle) return;

// ── DATA ────────────────────────────────────────────────
async function loadFromServer(){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/cineschedule?id=eq.main&select=data`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.token}`}
    });
    const rows = await r.json();
    if(rows[0]?.data){
      DB = rows[0].data;
      if(!DB.films) DB.films=[];
      if(!DB.days) DB.days={};
      if(!DB.settings) DB.settings={};
      resetColors();
      const _td=new Date();
      const todayKey=`${_td.getFullYear()}-${String(_td.getMonth()+1).padStart(2,'0')}-${String(_td.getDate()).padStart(2,'0')}`;
      if(DB.days[todayKey]) curDay=todayKey;
      else if(!curDay||!DB.days[curDay]){ const s=Object.keys(DB.days).sort(); if(s.length) curDay=s[s.length-1]; }
      renderDayTabs();
      if(curDay && DB.days[curDay]) buildTimeline();
      toast('Daten geladen ✓','ok');
      setView('boxes-bw');
    }
  } catch(e){ toast('Verbindungsfehler!','err'); }
}

// ── DAY TABS ────────────────────────────────────────────
function renderDayTabs(){
  const el=document.getElementById('dayTabs'); if(!el) return;
  const days=Object.keys(DB.days).sort();
  if(!days.length){ el.innerHTML='<span style="font-size:.75rem;color:var(--muted);">Keine Tage</span>'; return; }
  if(!curDay||!DB.days[curDay]) curDay=days[days.length-1];
  el.innerHTML=days.map(d=>`<div class="day-tab${d===curDay?' active':''}" onclick="switchDay('${d}')">${fmtDate(d).split(',')[0].trim()}, ${new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}</div>`).join('');
}

function switchDay(d){ curDay=d; renderDayTabs(); buildTimeline(); }

// ── TIMELINE BUILD ──────────────────────────────────────
function buildTimeline(){
  if(!curDay||!DB.days[curDay]) return;
  const d=DB.days[curDay];
  _cleanup=d.cleanup||30;
  _entries=[]; _ovMap={};
  for(const s in d.saale){
    const slots=d.saale[s]||[];
    slots.forEach((sl,i)=>{
      const f=DB.films.find(f=>f.id===sl.filmId); if(!f||!sl.startzeit) return;
      const ads=sl.ads!=null?sl.ads:30;
      const sm=t2m(sl.startzeit), fs=sm+ads, em=fs+f.len;
      const sc=(DB.settings?.saale?.[s]?.cleanup)||_cleanup;
      const ce=em+sc, credits=f.credits||0, door=credits>0?em-credits:em;
      _entries.push({saal:parseInt(s),idx:i,filmId:f.id,title:f.title,len:f.len,ads,credits,sm,fs,em,ce,door,sCleanup:sc,
        smT:m2t(sm),fsT:m2t(fs),emT:m2t(em),ceT:m2t(ce),doorT:m2t(door)});
    });
  }
  // Overlaps
  for(let s=1;s<=9;s++){
    const se=_entries.filter(e=>e.saal===s);
    for(let a=0;a<se.length;a++) for(let b=a+1;b<se.length;b++)
      if(se[a].sm<se[b].em&&se[a].em>se[b].sm){ _ovMap[`${s}_${se[a].idx}`]=1; _ovMap[`${s}_${se[b].idx}`]=1; }
  }
  // Next show
  for(let s=1;s<=9;s++){
    const se=_entries.filter(e=>e.saal===s).sort((a,b)=>a.sm-b.sm);
    se.forEach((e,i)=>{ const nx=se[i+1]; e.nextTitle=nx?.title||null; e.nextSmT=nx?.smT||null; e.gap=nx?nx.sm-e.em:null; e.isOv=!!_ovMap[`${e.saal}_${e.idx}`]; });
  }
  document.getElementById('tlDate').textContent=fmtDate(curDay);
  setView(activeView);
}

// ── VIEWS ───────────────────────────────────────────────
function setView(v){
  activeView=v;
  ['boxes-bw','table'].forEach(id=>{ const el=document.getElementById('tv-'+id); if(el) el.style.display=id===v?'block':'none'; });
  document.querySelectorAll('.vtab').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick')===`setView('${v}')`));
  const titles={boxes:'SÄLE','boxes-bw':'SÄLE S/W',table:'AUSLASSZETTEL'};
  const t=document.getElementById('tlTitle'); if(t) t.textContent=titles[v]||v.toUpperCase();
  if(v==='boxes') renderBoxView();
  else if(v==='boxes-bw') renderBoxBWView();
  else if(v==='table') renderTableView();
}

function renderTlView(){
  if(!_entries.length){ document.getElementById('tlContainer').innerHTML=''; return; }
  const mn=Math.min(..._entries.map(e=>e.sm)), mx=Math.max(..._entries.map(e=>e.ce));
  const hs=Math.floor(mn/60), he=Math.ceil(mx/60), total=(he-hs)*60;
  const p=v=>(v/total)*100;
  let ruler=`<div class="ruler"><div class="r-lbl">Saal</div><div class="r-hrs" style="position:relative;height:30px;">`;
  for(let h=hs;h<=he;h++) ruler+=`<div class="hm" style="left:${p((h-hs)*60)}%;"><span>${String(h).padStart(2,'0')}:00</span></div>`;
  ruler+=`</div></div>`;
  let rows='';
  for(let s=1;s<=9;s++){
    const se=_entries.filter(e=>e.saal===s); let blks='';
    se.forEach(e=>{
      const c=fc(e.filmId);
      if(e.ads>0) blks+=`<div class="mb-ad" style="left:${p(e.sm-hs*60)}%;width:${p(e.ads)}%;position:absolute;top:5px;height:calc(100% - 10px);background:repeating-linear-gradient(135deg,rgba(255,200,50,.18),rgba(255,200,50,.18) 4px,rgba(255,200,50,.08) 4px,rgba(255,200,50,.08) 8px);border:1px solid rgba(255,200,50,.5);border-radius:4px;" title="Werbung ${e.ads} Min"><span style="font-size:.6rem;color:rgba(255,200,50,.9);font-weight:700;padding:0 4px;">Werbung</span></div>`;
      blks+=`<div class="mb${e.isOv?' ov':''}" style="left:${p(e.fs-hs*60)}%;width:${p(e.len)}%;position:absolute;background:linear-gradient(135deg,${c[0]},${c[1]});" title="${esc(e.title)} · ${e.fsT}–${e.emT}"><div class="mbt">${esc(e.title)}</div><div class="mbt2">${e.fsT}–${e.emT}</div><div class="mbl">${e.len}Min</div></div>`;
    });
    const tlSeats=(DB.settings?.saale?.[s]?.seats)?`<div style="font-size:.52rem;color:var(--muted2);">👥${DB.settings.saale[s].seats}</div>`:'';
    rows+=`<div class="tl-row"><div class="tl-rl"><div class="tn">${s}</div><div class="ts">Saal</div>${tlSeats}</div><div class="tl-track" style="--hw:${total}min;">${blks}</div></div>`;
  }
  document.getElementById('tlContainer').innerHTML=`<div class="tl-wrap"><div class="tl-inner">${ruler}${rows}</div></div>`;
}

function renderTableView(){
  const sorted=[..._entries].filter(e=>e.nextTitle!==null).sort((a,b)=>{
    const da=a.credits>0?a.door:a.em, db=b.credits>0?b.door:b.em;
    return da!==db?da-db:a.saal-b.saal;
  });
  let h=`<table id="vorstellungTable" style="width:100%;">
    <thead><tr>
      <th>Filmtitel<div style="font-size:.6rem;font-weight:400;color:var(--muted);">Einlass · Werbung</div></th>
      <th style="width:1%;white-space:nowrap;">Nächste Vorstellung<div style="font-size:.6rem;font-weight:400;color:var(--muted);">Einlass · Werbung</div></th>
      <th style="width:1%;white-space:nowrap;text-align:center;">Aufräumzeit</th>
      <th style="width:1%;white-space:nowrap;text-align:right;">Saal</th>
      <th style="width:1%;white-space:nowrap;text-align:right;color:var(--green);">Auslass</th>
      <th style="width:1%;white-space:nowrap;text-align:right;">Besucher</th>
    </tr></thead><tbody>`;
  sorted.forEach((e,ri)=>{
    const gc=e.gap===null?'':e.gap<20?'gp-r':e.gap<30?'gp-w':'gp-g';
    const auslassT=e.credits>0?e.door:e.em;
    const auslassLbl=e.credits>0
      ?`${e.doorT}<span style="font-size:.62rem;color:rgba(46,216,122,.7);display:block;">Ende: ${e.emT}</span>`
      :e.emT;
    const titleShort=e.title.length>22?e.title.slice(0,22)+'…':e.title;

    // Einlasszeit + Werbung für aktuellen Film
    const curEinlass = e.smT || '–';
    const curWerbung = e.ads > 0 ? `${e.ads} Min` : '–';

    // Nächste Vorstellung — nextSmT ist bereits in entry gesetzt
    const nextEntry = _entries.find(x => x.title === e.nextTitle && x.saal === e.saal && x.sm > e.sm);
    const nextEinlass = nextEntry ? (nextEntry.smT || '–') : '–';
    const nextWerbung = nextEntry && nextEntry.ads > 0 ? `${nextEntry.ads} Min` : '–';

    const nextAuslass=sorted[ri+1]?(sorted[ri+1].credits>0?sorted[ri+1].door:sorted[ri+1].em):null;
    const auslassGap=nextAuslass!==null?nextAuslass-auslassT:null;
    const separator=auslassGap!==null&&auslassGap>45
      ?`<tr><td colspan="6" style="padding:1px 0;border:none;"><div style="border-top:3px solid #555;margin:2px 0;"></div></td></tr>`
      :'';
    h+=`<tr style="background:var(--s1);">
      <td>
        <strong style="font-size:.84rem;" title="${esc(e.title)}">${esc(titleShort)}</strong>
        <div style="font-size:.65rem;color:var(--muted);margin-top:2px;">⏰ ${curEinlass} · Werb: ${curWerbung}</div>
      </td>
      <td>${e.nextTitle
        ?`<div style="display:flex;flex-direction:column;gap:2px;">
            <span style="font-size:.68rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;display:block;">${esc(e.nextTitle.length>20?e.nextTitle.slice(0,20)+'…':e.nextTitle)}</span>
            <span style="font-size:.65rem;color:var(--muted);">⏰ ${nextEinlass} · Werb: ${nextWerbung}</span>
          </div>`
        :`<span style="color:var(--muted);font-size:.7rem;">Letzte</span>`}
      </td>
      <td style="text-align:center;white-space:nowrap;">
        ${e.gap!==null?`<span class="gap-pill ${gc}" style="display:block;width:100%;box-sizing:border-box;text-align:center;">${e.gap} Min</span>`:'<span style="color:var(--muted);font-size:.7rem;">–</span>'}
      </td>
      <td style="white-space:nowrap;text-align:right;"><span class="tg tg-s">SAAL ${e.saal}</span></td>
      <td class="tn" style="color:var(--green);font-weight:700;font-size:.9rem;white-space:nowrap;text-align:right;">${auslassLbl}</td>
      <td style="text-align:right;"><input type="text" placeholder="" style="width:52px;background:transparent;border:1px solid var(--border2);color:var(--text);padding:3px 5px;border-radius:3px;font-size:.78rem;font-family:'Outfit',sans-serif;text-align:center;"></td>
    </tr>${separator}`;
  });
  h+=`</tbody></table>`;
  document.getElementById('tableContainer').innerHTML=h;
}

function renderWeekView(){
  const el=document.getElementById('weekContainer'); if(!el) return;
  if(!_weekFrom||!_weekTo){
    const today=new Date(), dow=today.getDay()||7;
    const diffThu=(dow>=4)?dow-4:dow+3;
    const thu=new Date(today); thu.setDate(today.getDate()-diffThu);
    const wed=new Date(thu); wed.setDate(thu.getDate()+6);
    _weekFrom=thu.toISOString().slice(0,10);
    _weekTo=wed.toISOString().slice(0,10);
  }
  const days=[]; const cur=new Date(_weekFrom+'T12:00:00'), end=new Date(_weekTo+'T12:00:00');
  while(cur<=end){ days.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  const DOW=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const MONATE=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const todayStr=new Date().toISOString().slice(0,10);
  let html=`<div class="week-controls">
    <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);">Von</label>
    <input type="date" value="${_weekFrom}" style="background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:4px;font-family:'Outfit',sans-serif;font-size:.82rem;" onchange="_weekFrom=this.value;renderWeekView()"></div>
    <div style="display:flex;align-items:center;gap:8px;"><label style="font-size:.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);">Bis</label>
    <input type="date" value="${_weekTo}" style="background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:4px;font-family:'Outfit',sans-serif;font-size:.82rem;" onchange="_weekTo=this.value;renderWeekView()"></div>
    <button class="btn btn-s btn-sm" onclick="weekNav(-7)">← Woche zurück</button>
    <button class="btn btn-s btn-sm" onclick="weekNav(7)">Woche vor →</button>
  </div>
  <div class="week-table-wrap"><table class="week-table"><thead><tr>
    <th class="wt-day-header" style="background:var(--s2);border-right:2px solid var(--border2);">Tag</th>`;
  for(let s=1;s<=9;s++) html+=`<th class="wt-saal"><span style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;">${s}</span>${saalBadgeHtml(s)?` ${saalBadgeHtml(s)}`:''}</th>`;
  html+=`</tr></thead><tbody>`;
  days.forEach(d=>{
    const dt=new Date(d+'T12:00:00'), hasData=!!DB.days[d], isToday=d===todayStr;
    html+=`<tr class="${isToday?'wt-today':''}"><td class="wt-day-label">
      <div class="wc-day" style="color:${isToday?'var(--accent)':hasData?'var(--text)':'var(--muted)'}">${DOW[dt.getDay()]}${isToday?' ◀':''}</div>
      <div class="wc-date">${dt.getDate()}. ${MONATE[dt.getMonth()]}</div></td>`;
    for(let s=1;s<=9;s++){
      const dayData=DB.days[d];
      if(!dayData?.saale?.[s]?.length){ html+=`<td><span class="wc-empty">–</span></td>`; continue; }
      const slots=[...dayData.saale[s]].sort((a,b)=>!a.startzeit?1:!b.startzeit?-1:t2m(a.startzeit)-t2m(b.startzeit));
      html+=`<td>`;
      slots.forEach(sl=>{
        const f=DB.films.find(f=>f.id===sl.filmId); if(!f) return;
        const c=fc(f.id);
        html+=`<div class="wc-show" style="border-left-color:${c[1]};"><div class="wc-title" title="${esc(f.title)}">${esc(f.title)}</div><div class="wc-time">${sl.startzeit||'–'}</div></div>`;
      });
      html+=`</td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

function weekNav(d){
  const f=new Date(_weekFrom+'T12:00:00'), t=new Date(_weekTo+'T12:00:00');
  f.setDate(f.getDate()+d); t.setDate(t.getDate()+d);
  _weekFrom=f.toISOString().slice(0,10); _weekTo=t.toISOString().slice(0,10);
  renderWeekView();
}

  ['boxes','boxes-bw','table'].forEach(id=>{

// ── TOKEN AUTO-REFRESH (alle 45 Min) ────────────────────────
async function refreshToken() {
  const sess = JSON.parse(localStorage.getItem('csp_session') || 'null');
  if (!sess?.refreshToken) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ refresh_token: sess.refreshToken })
    });
    const data = await r.json();
    if (data.access_token) {
      sess.token = data.access_token;
      sess.refreshToken = data.refresh_token || sess.refreshToken;
      localStorage.setItem('csp_session', JSON.stringify(sess));
      session = sess;
    } else {
      localStorage.removeItem('csp_session');
      window.location.href = 'index.html';
    }
  } catch(e) { console.warn('Token-Refresh fehlgeschlagen', e); }
}
setInterval(refreshToken, 45 * 60 * 1000);

// ── AUTO-LOGOUT nach 1 Stunde Inaktivität ──────────────────
let _lastActivity = Date.now();
['click','keydown','mousemove','touchstart'].forEach(ev =>
  document.addEventListener(ev, () => { _lastActivity = Date.now(); }, { passive: true })
);
setInterval(() => {
  if (!session?.token) return;
  if (Date.now() - _lastActivity > 60 * 60 * 1000) doLogout();
}, 60 * 1000);
